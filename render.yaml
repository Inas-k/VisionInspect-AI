services:
  - type: web
    name: visioninspect-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: ALLOWED_ORIGINS
        value: https://visioninspect-ai.vercel.app
    healthCheckPath: /health
